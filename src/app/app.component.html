<div class="app-shell">
    <header class="topbar">
        <div class="title-block">
            <p class="eyebrow">Angular 21 Knowledge Platform</p>
            <h1>Portfolio Monorepo Starter</h1>
        </div>

        <nav class="nav-links" aria-label="Primary">
            @for (item of navItems; track item.path) {
                <a
                    [routerLink]="item.path"
                    routerLinkActive="active"
                    [routerLinkActiveOptions]="{ exact: item.path === '/tutorial' }"
                >
                    {{ item.label }}
                </a>
            }
        </nav>
    </header>

    <main class="main-content">
        <router-outlet></router-outlet>
    </main>
</div>
