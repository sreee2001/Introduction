<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Angular Portfolio</title>
        <base href="/" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <!-- Restore path after GitHub Pages 404 redirect -->
        <script>
            (function (l) {
                if (l.search[1] === '/') {
                    var decoded = l.search.slice(1).split('&').map(function (s) {
                        return s.replace(/~and~/g, '&');
                    });
                    window.history.replaceState(
                        null,
                        null,
                        l.pathname.slice(0, -1) +
                            decoded[0] +
                            (decoded[1] ? '?' + decoded[1] : '') +
                            l.hash,
                    );
                }
            })(window.location);
        </script>
    </head>
    <body>
        <app-root></app-root>
    </body>
</html>
