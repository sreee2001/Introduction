<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Redirecting…</title>
        <!--
            Single Page App redirect for GitHub Pages.
            When GitHub Pages serves this 404.html, we encode the original
            path into a query-param and redirect to index.html so Angular
            can take over routing.

            pathSegmentsToKeep = 1  (one segment for the repo name, e.g. /Introduction/)
        -->
        <script>
            var pathSegmentsToKeep = 1;
            var l = window.location;
            l.replace(
                l.protocol +
                    '//' +
                    l.hostname +
                    (l.port ? ':' + l.port : '') +
                    l.pathname
                        .split('/')
                        .slice(0, 1 + pathSegmentsToKeep)
                        .join('/') +
                    '/?/' +
                    l.pathname
                        .slice(1)
                        .split('/')
                        .slice(pathSegmentsToKeep)
                        .join('/')
                        .replace(/&/g, '~and~') +
                    (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
                    l.hash,
            );
        </script>
    </head>
    <body></body>
</html>
